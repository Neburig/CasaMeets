<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Viviendas Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --azul: #007bff; --rojo: #dc3545; --amarillo: #ffc107; --verde: #28a745; --oscuro: #2c3e50; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7f6; margin: 0; padding: 10px; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1, h2 { text-align: center; color: var(--oscuro); margin-bottom: 10px; }
        .btn { padding: 12px; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.2s; text-transform: uppercase; }
        .btn:active { transform: scale(0.95); }
        .vivienda-card { background: #fff; border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        #calendar { margin: 15px 0; background: white; font-size: 0.9em; border: 1px solid #eee; border-radius: 8px; padding: 5px; min-height: 300px; }
        .incidencia-item { border-left: 5px solid var(--rojo); background: #fff5f5; padding: 10px; margin: 8px 0; border-radius: 4px; list-style: none; font-size: 14px; }
        .img-preview { max-width: 100%; height: auto; display: block; margin-top: 8px; border-radius: 5px; border: 1px solid #ccc; }
        .hidden { display: none; }
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .botones-visita { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; }
        .fc-toolbar-title { text-transform: capitalize; font-size: 1.1em !important; }
        .instruccion { font-size: 11px; color: #666; text-align: center; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<div class="container" id="main-view">
    <h1>🏠 Mis Viviendas</h1>
    <div style="margin-bottom: 15px;">
        <input type="text" id="nombreVivienda" placeholder="Ej: Calle Mayor 5">
        <button class="btn" style="background: var(--oscuro); width: 100%;" onclick="agregarVivienda()">+ AÑADIR VIVIENDA</button>
    </div>
    <div id="listaViviendas"></div>
</div>

<div class="container hidden" id="detail-view">
    <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
        <button class="btn" style="background: #6c757d;" onclick="volver()">← Volver</button>
        <button class="btn" style="background: var(--oscuro);" onclick="generarPDF()">📄 PDF</button>
    </div>
    
    <h2 id="tituloVivienda" style="background: #eee; padding: 5px; border-radius: 5px;"></h2>

    <div style="background: #e9ecef; padding: 12px; border-radius: 8px; text-align: center;">
        <span class="instruccion">PARA MARCAR: ELIGE COLOR Y TOCA DÍA VACÍO</span>
        <span class="instruccion">PARA BORRAR: TOCA EL COLOR YA MARCADO</span>
        <div class="botones-visita">
            <button class="btn" id="btn-Normal" style="background: var(--azul);" onclick="setTipo('Normal', '#007bff')">ORDINARIA</button>
            <button class="btn" id="btn-Urgente" style="background: var(--rojo);" onclick="setTipo('Urgente', '#dc3545')">URGENTE</button>
            <button class="btn" id="btn-PENDIENTE" style="background: var(--amarillo); color: black;" onclick="setTipo('PENDIENTE', '#ffc107')">PENDIENTE</button>
            <button class="btn" id="btn-Programada" style="background: var(--verde);" onclick="setTipo('Programada', '#28a745')">PROGRAMADA</button>
        </div>
        <small id="status-tipo" style="font-weight: bold; color: var(--azul);">Modo: ORDINARIA</small>
    </div>

    <div id="calendar"></div>

    <hr>
    <h3>📝 Incidencias y Fotos</h3>
    <input type="text" id="textoIncidencia" placeholder="Nota o avería...">
    <div style="display: flex; flex-direction: column; gap: 10px;">
        <input type="file" id="fotoIncidencia" accept="image/*" capture="environment">
        <button class="btn" style="background: var(--verde);" onclick="agregarIncidencia()">GUARDAR NOTA</button>
    </div>
    <ul id="listaIncidencias" style="padding: 0;"></ul>
</div>

<script>
    let viviendas = JSON.parse(localStorage.getItem('viviendas_v7_del')) || {};
    let viviendaActual = "";
    let calendar;
    let tipoSeleccionado = { nombre: 'Normal', color: '#007bff' };

    function setTipo(nombre, color) {
        tipoSeleccionado = { nombre, color };
        document.getElementById('status-tipo').innerText = "Modo: " + nombre.toUpperCase();
        document.getElementById('status-tipo').style.color = color === '#ffc107' ? 'black' : color;
    }

    function agregarVivienda() {
        const nombre = document.getElementById('nombreVivienda').value.trim();
        if (!nombre) return;
        if (!viviendas[nombre]) {
            viviendas[nombre] = { visitas: [], incidencias: [] };
            guardar();
        }
        document.getElementById('nombreVivienda').value = "";
        renderLista();
    }

    function renderLista() {
        const lista = document.getElementById('listaViviendas');
        lista.innerHTML = "";
        Object.keys(viviendas).forEach(nombre => {
            lista.innerHTML += `
                <div class="vivienda-card" onclick="abrirVivienda('${nombre}')">
                    <strong>${nombre}</strong>
                    <span style="color: var(--azul); font-weight:bold;">ABRIR →</span>
                </div>`;
        });
    }

    function abrirVivienda(nombre) {
        viviendaActual = nombre;
        document.getElementById('main-view').classList.add('hidden');
        document.getElementById('detail-view').classList.remove('hidden');
        document.getElementById('tituloVivienda').innerText = nombre;
        
        setTimeout(() => {
            const calendarEl = document.getElementById('calendar');
            if(calendar) calendar.destroy();
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'es',
                firstDay: 1, 
                buttonText: { today: 'Hoy' },
                headerToolbar: { left: 'prev,next', center: 'title', right: 'today' },
                events: viviendas[viviendaActual].visitas,
                height: 'auto',
                dateClick: function(info) {
                    // Si el día está vacío, añadimos
                    const yaExiste = viviendas[viviendaActual].visitas.find(v => v.start === info.dateStr);
                    if (!yaExiste) {
                        const nuevaVisita = { 
                            title: tipoSeleccionado.nombre, 
                            start: info.dateStr, 
                            backgroundColor: tipoSeleccionado.color, 
                            borderColor: tipoSeleccionado.color, 
                            allDay: true 
                        };
                        viviendas[viviendaActual].visitas.push(nuevaVisita);
                        guardar();
                        calendar.addEvent(nuevaVisita);
                    }
                },
                eventClick: function(info) {
                    // Si pulsamos sobre un evento (color), preguntamos para borrar
                    if (confirm("¿Quieres eliminar esta visita de " + info.event.title + "?")) {
                        // Borrar del array
                        viviendas[viviendaActual].visitas = viviendas[viviendaActual].visitas.filter(v => 
                            !(v.start === info.event.startStr && v.title === info.event.title)
                        );
                        guardar();
                        info.event.remove(); // Borrar del calendario
                    }
                }
            });
            calendar.render();
        }, 100);
        renderIncidencias();
    }

    function agregarIncidencia() {
        const texto = document.getElementById('textoIncidencia').value.trim();
        const fileInput = document.getElementById('fotoIncidencia');
        if (!texto) return;

        if (fileInput.files && fileInput.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                viviendas[viviendaActual].incidencias.unshift({ texto, foto: e.target.result, fecha: new Date().toLocaleString('es-ES') });
                finalizarIncidencia();
            };
            reader.readAsDataURL(fileInput.files[0]);
        } else {
            viviendas[viviendaActual].incidencias.unshift({ texto, foto: null, fecha: new Date().toLocaleString('es-ES') });
            finalizarIncidencia();
        }
    }

    function finalizarIncidencia() {
        guardar();
        renderIncidencias();
        document.getElementById('textoIncidencia').value = "";
        document.getElementById('fotoIncidencia').value = "";
    }

    function renderIncidencias() {
        const lista = document.getElementById('listaIncidencias');
        lista.innerHTML = "";
        viviendas[viviendaActual].incidencias.forEach(inc => {
            lista.innerHTML += `<li class="incidencia-item"><small>${inc.fecha}</small><br><strong>${inc.texto}</strong>${inc.foto ? `<img src="${inc.foto}" class="img-preview">` : ''}</li>`;
        });
    }

    function generarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text(`INFORME: ${viviendaActual}`, 10, 20);
        let y = 35;
        viviendas[viviendaActual].visitas.sort((a,b) => a.start.localeCompare(b.start)).forEach(v => { 
            doc.text(`- ${v.start}: ${v.title}`, 15, y); 
            y += 7; 
            if(y > 280) { doc.addPage(); y = 20; }
        });
        doc.save(`Informe_${viviendaActual}.pdf`);
    }

    function guardar() { localStorage.setItem('viviendas_v7_del', JSON.stringify(viviendas)); }
    function volver() { document.getElementById('main-view').classList.remove('hidden'); document.getElementById('detail-view').classList.add('hidden'); }
    renderLista();
</script>
</body>
</html>
