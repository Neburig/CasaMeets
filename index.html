<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Viviendas Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --azul: #007bff; --rojo: #dc3545; --amarillo: #ffc107; --verde: #28a745; --oscuro: #2c3e50; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7f6; margin: 0; padding: 10px; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1, h2 { text-align: center; color: var(--oscuro); margin-bottom: 10px; }
        .btn { padding: 10px; border: none; border-radius: 6px; color: white; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        .vivienda-card { background: #fff; border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        #calendar { margin: 15px 0; background: white; font-size: 0.9em; }
        /* Estilos para forzar el español en el calendario */
        .fc-header-toolbar { font-size: 0.8em; flex-wrap: wrap; gap: 5px; }
        .incidencia-item { border-left: 5px solid var(--rojo); background: #fff5f5; padding: 10px; margin: 8px 0; border-radius: 4px; list-style: none; font-size: 14px; }
        .img-preview { max-width: 100%; height: auto; display: block; margin-top: 8px; border-radius: 5px; }
        .hidden { display: none; }
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .botones-visita { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 10px 0; }
        .fc-toolbar-title { text-transform: capitalize; }
    </style>
</head>
<body>

<div class="container" id="main-view">
    <h1>🏠 Mis Viviendas</h1>
    <div style="margin-bottom: 15px;">
        <input type="text" id="nombreVivienda" placeholder="Nombre de la vivienda...">
        <button class="btn" style="background: var(--verde); width: 100%;" onclick="agregarVivienda()">+ AÑADIR VIVIENDA</button>
    </div>
    <div id="listaViviendas"></div>
</div>

<div class="container hidden" id="detail-view">
    <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
        <button class="btn" style="background: #6c757d;" onclick="volver()">← Volver</button>
        <button class="btn" style="background: var(--oscuro);" onclick="generarPDF()">📄 Informe PDF</button>
    </div>
    
    <h2 id="tituloVivienda"></h2>

    <div style="background: #f8f9fa; padding: 12px; border-radius: 8px; text-align: center;">
        <small>Registrar visita para HOY:</small>
        <div class="botones-visita">
            <button class="btn" style="background: var(--azul);" onclick="registrarVisita('#007bff', 'Normal')">AZUL</button>
            <button class="btn" style="background: var(--rojo);" onclick="registrarVisita('#dc3545', 'Urgente')">ROJO</button>
            <button class="btn" style="background: var(--amarillo); color: black;" onclick="registrarVisita('#ffc107', 'PENDIENTE')">AMARILLO</button>
        </div>
    </div>

    <div id="calendar"></div>

    <hr>
    <h3>📝 Incidencias y Fotos</h3>
    <input type="text" id="textoIncidencia" placeholder="¿Qué ha pasado hoy?">
    <div style="display: flex; flex-direction: column; gap: 10px;">
        <input type="file" id="fotoIncidencia" accept="image/*" capture="environment">
        <button class="btn" style="background: var(--verde);" onclick="agregarIncidencia()">GUARDAR INCIDENCIA</button>
    </div>
    <ul id="listaIncidencias" style="padding: 0;"></ul>
</div>

<script>
    let viviendas = JSON.parse(localStorage.getItem('viviendas_data_v3')) || {};
    let viviendaActual = "";
    let calendar;

    function agregarVivienda() {
        const nombre = document.getElementById('nombreVivienda').value.trim();
        if (!nombre) return;
        if (!viviendas[nombre]) {
            viviendas[nombre] = { visitas: [], incidencias: [] };
            guardar();
        }
        document.getElementById('nombreVivienda').value = "";
        renderLista();
    }

    function renderLista() {
        const lista = document.getElementById('listaViviendas');
        lista.innerHTML = "";
        Object.keys(viviendas).forEach(nombre => {
            lista.innerHTML += `
                <div class="vivienda-card" onclick="abrirVivienda('${nombre}')">
                    <strong>${nombre}</strong>
                    <span style="color: var(--azul);">Ver →</span>
                </div>`;
        });
    }

    function abrirVivienda(nombre) {
        viviendaActual = nombre;
        document.getElementById('main-view').classList.add('hidden');
        document.getElementById('detail-view').classList.remove('hidden');
        document.getElementById('tituloVivienda').innerText = nombre;
        
        setTimeout(() => {
            const calendarEl = document.getElementById('calendar');
            if(calendar) calendar.destroy();
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'es', // FORZAR ESPAÑOL
                firstDay: 1, // Lunes como primer día
                buttonText: { today: 'Hoy' },
                headerToolbar: { left: 'prev,next', center: 'title', right: 'today' },
                events: viviendas[viviendaActual].visitas,
                height: 'auto'
            });
            calendar.render();
        }, 100);
        renderIncidencias();
    }

    function registrarVisita(color, tipo) {
        const hoy = new Date().toISOString().split('T')[0];
        const nuevaVisita = { title: tipo, start: hoy, backgroundColor: color, borderColor: color, allDay: true };
        
        // Evitar duplicados el mismo día
        viviendas[viviendaActual].visitas = viviendas[viviendaActual].visitas.filter(v => v.start !== hoy);
        viviendas[viviendaActual].visitas.push(nuevaVisita);
        
        guardar();
        calendar.removeAllEvents();
        calendar.addEventSource(viviendas[viviendaActual].visitas);
        alert("Guardado: Visita " + tipo);
    }

    function agregarIncidencia() {
        const texto = document.getElementById('textoIncidencia').value.trim();
        const fileInput = document.getElementById('fotoIncidencia');
        if (!texto) return;

        if (fileInput.files && fileInput.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                viviendas[viviendaActual].incidencias.unshift({ texto, foto: e.target.result, fecha: new Date().toLocaleString('es-ES') });
                finalizarIncidencia();
            };
            reader.readAsDataURL(fileInput.files[0]);
        } else {
            viviendas[viviendaActual].incidencias.unshift({ texto, foto: null, fecha: new Date().toLocaleString('es-ES') });
            finalizarIncidencia();
        }
    }

    function finalizarIncidencia() {
        guardar();
        renderIncidencias();
        document.getElementById('textoIncidencia').value = "";
        document.getElementById('fotoIncidencia').value = "";
    }

    function renderIncidencias() {
        const lista = document.getElementById('listaIncidencias');
        lista.innerHTML = "";
        viviendas[viviendaActual].incidencias.forEach(inc => {
            lista.innerHTML += `
                <li class="incidencia-item">
                    <small>${inc.fecha}</small><br>
                    <strong>${inc.texto}</strong>
                    ${inc.foto ? `<img src="${inc.foto}" class="img-preview">` : ''}
                </li>`;
        });
    }

    function generarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text(`INFORME DE GESTIÓN: ${viviendaActual}`, 10, 20);
        let y = 30;
        
        doc.text("Visitas realizadas:", 10, y);
        y += 10;
        viviendas[viviendaActual].visitas.forEach(v => {
            doc.text(`- ${v.start}: ${v.title}`, 15, y);
            y += 7;
        });

        y += 10;
        doc.text("Incidencias:", 10, y);
        y += 10;
        viviendas[viviendaActual].incidencias.forEach(i => {
            doc.text(`- ${i.fecha}: ${i.texto}`, 15, y);
            y += 7;
        });
        
        doc.save(`Informe_${viviendaActual}.pdf`);
    }

    function guardar() { localStorage.setItem('viviendas_data_v3', JSON.stringify(viviendas)); }
    function volver() { document.getElementById('main-view').classList.remove('hidden'); document.getElementById('detail-view').classList.add('hidden'); }

    renderLista();
</script>
</body>
</html>
